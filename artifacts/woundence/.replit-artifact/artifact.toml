kind = "web"
previewPath = "/"
title = "Woundence EMR"
version = "1.0.0"
id = "artifacts/woundence"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22916

[services.development]
run = "pnpm --filter @workspace/woundence run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/woundence", "run", "build" ]
publicDir = "artifacts/woundence/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22916"
BASE_PATH = "/"
